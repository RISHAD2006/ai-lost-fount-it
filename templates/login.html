<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Campus Found-It AI</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body {
      margin: 0; font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .card {
      background: white; padding: 40px; width: 370px;
      border-radius: 16px; box-shadow: 0 12px 30px rgba(0,0,0,0.3); text-align: center;
    }
    .card h2 { color: #203a43; margin-bottom: 6px; }
    .card p  { color: #64748b; font-size: 13px; margin-bottom: 20px; }
    input {
      width: 100%; padding: 11px 14px; margin: 7px 0;
      border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #203a43; }
    .btn {
      width: 100%; padding: 12px; background: #203a43; border: none;
      color: white; font-weight: bold; border-radius: 8px; cursor: pointer;
      margin-top: 12px; font-size: 15px; transition: 0.25s;
    }
    .btn:hover { background: #0f2027; transform: translateY(-1px); }
    .link { background: none; color: #203a43; border: none; margin-top: 10px;
            cursor: pointer; font-size: 13px; text-decoration: underline; }
    .msg { margin-top: 12px; font-size: 13px; color: #e74c3c; min-height: 20px; }
    .msg.ok { color: #16a34a; }
  </style>
</head>
<body>
<div class="card">
  <h2>Welcome Back 👋</h2>
  <p>Login to access your dashboard</p>

  <input type="email"    id="email"    placeholder="Email Address" />
  <input type="password" id="password" placeholder="Password" />

  <button class="btn" onclick="login()">Login</button>
  <br/>
  <button class="link" onclick="location.href='/register-page'">
    Don't have an account? Register
  </button>

  <div class="msg" id="msg"></div>
</div>

<script>
const API = window.location.origin;

async function login() {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const msgEl    = document.getElementById("msg");

  const res  = await fetch(${API}/login, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  msgEl.textContent = data.message;
  msgEl.className   = res.ok ? "msg ok" : "msg";

  if (res.ok) {
    localStorage.setItem("user_id", data.user_id);
    localStorage.setItem("name",    data.name);
    localStorage.setItem("email",   data.email);
    localStorage.setItem("phone",   data.phone || "");
    setTimeout(() => location.href = "/dashboard", 800);
  }
}
</script>
</body>
</html>
