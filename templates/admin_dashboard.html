<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Campus Found-It AI</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1828/1828640.png" />
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; }

    /* ── NAVBAR ── */
    .navbar {
      background: #0f172a; color: white;
      padding: 14px 24px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px; position: sticky; top: 0; z-index: 100;
    }
    .navbar h2 { font-size: 20px; }
    .navbar .right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .navbar span { font-size: 13px; opacity: 0.75; }
    .navbar button {
      background: #ef4444; border: none; color: white;
      padding: 7px 14px; border-radius: 7px; cursor: pointer; font-size: 13px;
    }

    /* ── MATCH POPUP ── */
    .popup {
      display: none; position: fixed; top: 20px; right: 20px; z-index: 999;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white; padding: 18px 24px; border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 320px;
      animation: slideIn 0.4s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .popup h4 { margin-bottom: 6px; font-size: 16px; }
    .popup p  { font-size: 13px; opacity: 0.9; line-height: 1.5; }

    /* ── MAIN ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

    /* ── SEARCH ── */
    .search-bar {
      display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .search-bar input {
      flex: 1; min-width: 200px; padding: 11px 16px;
      border-radius: 10px; border: 1px solid #cbd5e1;
      font-size: 14px; outline: none;
    }
    .search-bar input:focus { border-color: #6366f1; }
    .search-bar button {
      padding: 11px 22px; background: #6366f1; color: white;
      border: none; border-radius: 10px; cursor: pointer; font-size: 14px;
    }

    /* ── UPLOAD CARD ── */
    .upload-card {
      background: white; border-radius: 16px;
      padding: 24px; margin-bottom: 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    }
    .upload-card h3 { font-size: 18px; margin-bottom: 16px; color: #1e293b; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row.single { grid-template-columns: 1fr; }
    .form-row input, .form-row textarea, .form-row select {
      width: 100%; padding: 10px 14px;
      border-radius: 9px; border: 1px solid #cbd5e1;
      font-size: 14px; outline: none; transition: border 0.2s;
    }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
      border-color: #6366f1;
    }
    .form-row textarea { resize: vertical; min-height: 80px; }
    .upload-btn {
      margin-top: 14px; padding: 12px 28px;
      background: #6366f1; color: white; border: none;
      border-radius: 10px; font-size: 15px; font-weight: bold;
      cursor: pointer; transition: 0.2s; width: 100%;
    }
    .upload-btn:hover { background: #4f46e5; }
    .upload-msg { margin-top: 10px; padding: 10px 14px; border-radius: 9px; font-size: 14px; display: none; }
    .upload-msg.ok     { background: #dcfce7; color: #166534; }
    .upload-msg.match  { background: #ede9fe; color: #5b21b6; font-weight: bold; }
    .upload-msg.error  { background: #fee2e2; color: #991b1b; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab {
      padding: 9px 20px; border-radius: 10px; border: 2px solid transparent;
      cursor: pointer; font-size: 14px; font-weight: 600; transition: 0.2s;
      background: white; color: #64748b;
    }
    .tab.active-all   { border-color: #6366f1; background: #6366f1; color: white; }
    .tab.active-lost  { border-color: #ef4444; background: #ef4444; color: white; }
    .tab.active-found { border-color: #10b981; background: #10b981; color: white; }
    .tab.active-mine  { border-color: #f59e0b; background: #f59e0b; color: white; }

    /* ── ITEMS GRID ── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }
    .item-card {
      background: white; border-radius: 14px; overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07); transition: transform 0.2s;
    }
    .item-card:hover { transform: translateY(-3px); }
    .item-card img {
      width: 100%; height: 180px; object-fit: cover; display: block;
    }
    .item-info { padding: 14px; }
    .item-info h4 { font-size: 15px; margin-bottom: 6px; }
    .item-info p  { font-size: 12px; color: #64748b; line-height: 1.5; margin-bottom: 8px; }
    .item-meta { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
    .pill {
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold;
    }
    .pill-lost    { background: #fee2e2; color: #b91c1c; }
    .pill-found   { background: #dcfce7; color: #166534; }
    .pill-matched { background: #ede9fe; color: #5b21b6; }
    .pill-score   { background: #fef3c7; color: #92400e; }
    .contact-box {
      margin-top: 8px; padding: 7px 10px;
      background: #f0fdf4; border-radius: 7px;
      font-size: 12px; color: #166534;
      border: 1px solid #bbf7d0;
    }
    .contact-box b { display: block; margin-bottom: 2px; }
    .del-btn {
      margin-top: 8px; padding: 6px 14px;
      background: #ef4444; color: white; border: none;
      border-radius: 7px; font-size: 12px; cursor: pointer;
    }
    .del-btn:hover { background: #dc2626; }

    .empty { text-align: center; color: #94a3b8; padding: 40px; grid-column: 1/-1; }
    .loading { text-align: center; color: #6366f1; padding: 30px; grid-column: 1/-1; }

    @media(max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>🤖 Campus Found-It AI</h2>
  <div class="right">
    <span id="user-info"></span>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- MATCH POPUP -->
<div class="popup" id="popup">
  <h4>🎉 AI MATCH FOUND!</h4>
  <p id="popup-detail"></p>
</div>

<div class="main">

  <!-- SEARCH -->
  <div class="search-bar">
    <input id="search-input" placeholder="Search items by name (e.g. black bag, phone, keys)..." />
    <button onclick="searchItems()">🔍 Search</button>
  </div>

  <!-- UPLOAD CARD -->
  <div class="upload-card">
    <h3>📤 Upload Lost / Found Item</h3>

    <div class="form-row">
      <input id="title"   placeholder="Item Title (e.g. Blue Water Bottle)" />
      <input id="contact" placeholder="Your Phone or Email for contact" />
    </div>
    <div class="form-row single" style="margin-top:12px">
      <textarea id="description" placeholder="Describe the item — colour, brand, unique marks..."></textarea>
    </div>
    <div class="form-row" style="margin-top:12px">
      <select id="status">
        <option value="lost">🔴 I Lost this Item</option>
        <option value="found">🟢 I Found this Item</option>
      </select>
      <input type="file" id="image" accept="image/*" />
    </div>

    <button class="upload-btn" onclick="uploadItem()">Upload &amp; Find Match →</button>
    <div class="upload-msg" id="upload-msg"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active-all"  onclick="switchTab('all')"  id="tab-all">📋 All Items</button>
    <button class="tab"             onclick="switchTab('lost')" id="tab-lost">🔴 Lost Items</button>
    <button class="tab"             onclick="switchTab('found')"id="tab-found">🟢 Found Items</button>
    <button class="tab"             onclick="switchTab('mine')" id="tab-mine">👤 My Items</button>
  </div>

  <!-- ITEMS GRID -->
  <div class="items-grid" id="items-grid">
    <div class="loading">Loading items...</div>
  </div>

</div><!-- /main -->

<script>
const API     = window.location.origin;
const userId  = localStorage.getItem("user_id");
const name    = localStorage.getItem("name");
const email   = localStorage.getItem("email");

if (!userId) location.href = "/login-page";

document.getElementById("user-info").textContent = `${name} (${email})`;

// ── Socket.IO ──
const socket = io(API);
socket.on("match_found", data => {
  if (data.user1 == userId || data.user2 == userId) {
    const popup  = document.getElementById("popup");
    const detail = document.getElementById("popup-detail");
    detail.innerHTML =
      `<b>${data.matched_title}</b><br/>Score: ${data.score}%` +
      (data.contact ? `<br/>📞 Contact: ${data.contact}` : "");
    popup.style.display = "block";
    setTimeout(() => popup.style.display = "none", 6000);
    loadItems(currentTab);
  }
});

// ── Tabs ──
let currentTab = "all";
function switchTab(tab) {
  currentTab = tab;
  ["all","lost","found","mine"].forEach(t => {
    const el = document.getElementById("tab-" + t);
    el.className = "tab";
    if (t === tab) el.classList.add("active-" + t);
  });
  loadItems(tab);
}

// ── Load items ──
async function loadItems(tab) {
  const grid = document.getElementById("items-grid");
  grid.innerHTML = '<div class="loading">Loading...</div>';

  let url;
  if (tab === "mine") {
    url = `${API}/my-items/${userId}`;
  } else if (tab === "lost") {
    url = `${API}/all-items?status=lost`;
  } else if (tab === "found") {
    url = `${API}/all-items?status=found`;
  } else {
    url = `${API}/all-items`;
  }

  try {
    const res   = await fetch(url);
    const items = await res.json();
    renderItems(items, tab === "mine");
  } catch (e) {
    grid.innerHTML = '<div class="empty">Failed to load items.</div>';
  }
}

function renderItems(items, showDelete) {
  const grid = document.getElementById("items-grid");
  if (!items.length) {
    grid.innerHTML = '<div class="empty">No items found.</div>';
    return;
  }
  grid.innerHTML = items.map(i => itemHTML(i, showDelete)).join("");
}

function itemHTML(i, showDel) {
  const img = i.image_url
    ? `<img src="${i.image_url}" alt="item" />`
    : `<div style="height:180px;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:40px;">📦</div>`;

  const statusPill = i.status === "lost"
    ? `<span class="pill pill-lost">🔴 Lost</span>`
    : `<span class="pill pill-found">🟢 Found</span>`;

  const matchPill = i.matched
    ? `<span class="pill pill-matched">🤖 AI Matched</span>` : "";

  const contactBox = i.contact
    ? `<div class="contact-box"><b>📞 Contact:</b>${escHtml(i.contact)}</div>` : "";

  const delBtn = showDel
    ? `<button class="del-btn" onclick="deleteItem(${i.id})">🗑 Delete</button>` : "";

  return `
  <div class="item-card">
    ${img}
    <div class="item-info">
      <h4>${escHtml(i.title)}</h4>
      <p>${escHtml(i.description || "No description")}</p>
      <div class="item-meta">${statusPill} ${matchPill}</div>
      ${contactBox}
      ${delBtn}
    </div>
  </div>`;
}

// ── Search ──
async function searchItems() {
  const q    = document.getElementById("search-input").value.trim();
  if (!q) { loadItems(currentTab); return; }
  const grid = document.getElementById("items-grid");
  grid.innerHTML = '<div class="loading">Searching...</div>';
  const res   = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
  const items = await res.json();
  if (!items.length) {
    grid.innerHTML = '<div class="empty">No matching items found.</div>';
    return;
  }
  grid.innerHTML = items.map(i => {
    const scoreTag = `<span class="pill pill-score">🎯 ${i.score}% match</span>`;
    return itemHTML(i, false).replace('</div>\n  </div>', `${scoreTag}</div>\n  </div>`);
  }).join("");
}
document.getElementById("search-input").addEventListener("keydown", e => {
  if (e.key === "Enter") searchItems();
});

// ── Upload ──
async function uploadItem() {
  const title   = document.getElementById("title").value.trim();
  const desc    = document.getElementById("description").value.trim();
  const status  = document.getElementById("status").value;
  const contact = document.getElementById("contact").value.trim();
  const image   = document.getElementById("image").files[0];
  const msgEl   = document.getElementById("upload-msg");

  if (!title || !image) {
    showMsg("Please enter a title and choose an image.", "error");
    return;
  }

  showMsg("Uploading and running AI match...", "ok");

  const form = new FormData();
  form.append("title",       title);
  form.append("description", desc);
  form.append("status",      status);
  form.append("user_id",     userId);
  form.append("contact",     contact);
  form.append("image",       image);

  try {
    const res  = await fetch(`${API}/upload`, { method: "POST", body: form });
    const data = await res.json();

    if (data.match_score && data.match_score >= 40) {
      showMsg(
        `🎉 MATCH FOUND! Score: ${data.match_score}%  |  Item: "${data.matched_item}"` +
        (data.contact ? `  |  Contact: ${data.contact}` : ""),
        "match"
      );
    } else {
      showMsg(data.message || "Uploaded successfully!", "ok");
    }

    // Clear form
    document.getElementById("title").value       = "";
    document.getElementById("description").value = "";
    document.getElementById("contact").value     = "";
    document.getElementById("image").value       = "";

    loadItems(currentTab);
  } catch (e) {
    showMsg("Upload failed. Please try again.", "error");
  }
}

function showMsg(text, type) {
  const el = document.getElementById("upload-msg");
  el.textContent = text;
  el.className   = "upload-msg " + type;
  el.style.display = "block";
}

// ── Delete ──
async function deleteItem(id) {
  if (!confirm("Delete this item?")) return;
  await fetch(`${API}/delete/${id}`, { method: "DELETE" });
  loadItems(currentTab);
}

// ── Logout ──
function logout() {
  localStorage.clear();
  location.href = "/login-page";
}

function escHtml(s) {
  const d = document.createElement("div");
  d.innerText = s || "";
  return d.innerHTML;
}

// Initial load
loadItems("all");
</script>
</body>
</html>
