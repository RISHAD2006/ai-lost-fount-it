<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – Campus Found-It AI</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body {
      margin: 0; font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .card {
      background: white; padding: 40px; width: 370px;
      border-radius: 16px; box-shadow: 0 12px 30px rgba(0,0,0,0.25); text-align: center;
    }
    .card h2 { color: #1e3c72; margin-bottom: 6px; }
    .card p  { color: #64748b; font-size: 13px; margin-bottom: 20px; }
    input {
      width: 100%; padding: 11px 14px; margin: 7px 0;
      border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #2a5298; }
    .btn {
      width: 100%; padding: 12px; background: #2a5298; border: none;
      color: white; font-weight: bold; border-radius: 8px; cursor: pointer;
      margin-top: 12px; font-size: 15px; transition: 0.25s;
    }
    .btn:hover { background: #1e3c72; transform: translateY(-1px); }
    .link { background: none; color: #2a5298; border: none; margin-top: 10px;
            cursor: pointer; font-size: 13px; text-decoration: underline; }
    .msg { margin-top: 12px; font-size: 13px; color: #e74c3c; min-height: 20px; }
    .msg.ok { color: #16a34a; }
  </style>
</head>
<body>
<div class="card">
  <h2>Create Account ✨</h2>
  <p>Register to start recovering lost items</p>

  <input type="text"  id="name"     placeholder="Full Name" />
  <input type="email" id="email"    placeholder="Email Address" />
  <input type="tel"   id="phone"    placeholder="Phone Number (optional)" />
  <input type="password" id="password" placeholder="Password" />

  <button class="btn" onclick="register()">Register</button>
  <br/>
  <button class="link" onclick="location.href='/login-page'">
    Already have an account? Login
  </button>

  <div class="msg" id="msg"></div>
</div>

<script>
const API = window.location.origin;

async function register() {
  const name     = document.getElementById("name").value.trim();
  const email    = document.getElementById("email").value.trim();
  const phone    = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value;
  const msgEl    = document.getElementById("msg");

  if (!name || !email || !password) {
    msgEl.textContent = "Please fill all required fields.";
    return;
  }

  const res  = await fetch(${API}/register, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, phone, password })
  });
  const data = await res.json();

  msgEl.textContent = data.message;
  msgEl.className   = res.ok ? "msg ok" : "msg";

  if (res.ok) {
    setTimeout(() => location.href = "/login-page", 1200);
  }
}
</script>
</body>
</html>
