<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Campus Found-It AI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="center-page" style="background:linear-gradient(135deg,#1e3c72,#2a5298);">

<div class="auth-card">
  <h2>Create Account ✨</h2>
  <p class="subtitle">Register to start using the platform</p>

  <input class="input" type="text"     id="name"     placeholder="Full Name *">
  <input class="input" type="email"    id="email"    placeholder="Email Address *">
  <input class="input" type="tel"      id="phone"    placeholder="Phone Number (optional)">
  <input class="input" type="password" id="password" placeholder="Password *">

  <button class="btn btn-blue full-width" onclick="doRegister()">Register Now</button>
  <div class="msg" id="msg"></div>

  <p class="switch-link">Already have an account? <a href="/login">Login here</a></p>
</div>

<script>
async function doRegister() {
  const name     = document.getElementById("name").value.trim();
  const email    = document.getElementById("email").value.trim();
  const phone    = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();
  const msgEl    = document.getElementById("msg");

  if (!name || !email || !password) {
    showMsg("Please fill all required fields.", "error"); return;
  }

  showMsg("Registering...", "info");

  const res  = await fetch("/api/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, phone, password })
  });
  const data = await res.json();

  if (res.ok) {
    showMsg(data.message, "success");
    setTimeout(() => location.href = "/login", 1500);
  } else {
    showMsg(data.error || "Registration failed", "error");
  }
}

function showMsg(text, type) {
  const el = document.getElementById("msg");
  el.textContent = text;
  el.className   = "msg msg-" + type;
}
</script>
</body>
</html>
