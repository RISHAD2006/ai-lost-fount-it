<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Campus Found-It AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1828/1828640.png">

<link rel="stylesheet" href="/static/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
text-align:center;
}

.container{
background:rgba(255,255,255,0.08);
padding:50px 40px;
border-radius:20px;
backdrop-filter:blur(12px);
box-shadow:0 15px 40px rgba(0,0,0,0.4);
max-width:500px;
width:90%;
}

h1{
font-size:36px;
margin-bottom:15px;
}

p{
font-size:18px;
margin-bottom:35px;
opacity:0.9;
}

.buttons{
display:flex;
gap:20px;
justify-content:center;
}

.buttons a{
text-decoration:none;
width:50%;
}

.buttons button{
width:100%;
padding:14px;
border-radius:8px;
border:none;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s ease;
}

.login-btn{
background:#3498db;
color:white;
}

.login-btn:hover{
background:#2980b9;
transform:translateY(-2px);
}

.register-btn{
background:#2ecc71;
color:white;
}

.register-btn:hover{
background:#27ae60;
transform:translateY(-2px);
}

footer{
margin-top:25px;
font-size:13px;
opacity:0.7;
}

@media(max-width:500px){

.buttons{
flex-direction:column;
}

.buttons a{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Campus Found-It AI 🤖</h1>

<p>Smart AI-Powered Lost & Found Platform for College Campus</p>

<div class="buttons">

<a href="/login-page">
<button class="login-btn">Login</button>
</a>

<a href="/register-page">
<button class="register-btn">Register</button>
</a>

</div>

<footer>
Powered by AI Image Matching • Secure • Real-Time Alerts
</footer>

</div>

<script src="/static/script.js"></script>

</body>
</html>
