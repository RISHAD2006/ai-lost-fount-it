<!DOCTYPE html>
<html>
<head>
    <title>Campus Found-It AI</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SocketIO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg,#eef2f3,#dfe9f3);
        }

        /* NAVBAR */
        .navbar {
            background: linear-gradient(90deg,#141e30,#243b55);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .navbar button {
            background: #e74c3c;
            border: none;
            padding: 8px 15px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .container { padding: 30px; }

        .card-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button.primary {
            background: #3498db;
            border: none;
            padding: 12px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        /* GRID */
        .items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        /* CARD */
        .item-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            transition: 0.3s;
        }

        .item-card:hover { transform: translateY(-5px); }

        /* 🔥 IMAGE FIX - NO CROP */
        .image-wrapper {
            width: 100%;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            border-radius: 12px;
            overflow: hidden;
        }

        .image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .badge {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 20px;
            color: white;
            display: inline-block;
            margin-top: 6px;
            margin-right: 5px;
        }

        .lost { background: #e74c3c; }
        .found { background: #2ecc71; }
        .matched { background: #8e44ad; }

        .delete-btn {
            margin-top: 10px;
            background: #c0392b;
            border: none;
            padding: 8px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        .success-box {
            background: #2ecc71;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        /* 🔥 MATCH POPUP */
        .live-popup {
            position: fixed;
            top: 25px;
            right: 25px;
            background: linear-gradient(135deg,#8e44ad,#6c3483);
            color: white;
            padding: 18px 30px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            z-index: 9999;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media(max-width:768px){
            .container { padding: 15px; }
        }

    </style>
</head>
<body>

<div class="navbar">
    <div>
        <h2>Campus Found-It AI 🤖</h2>
        <small id="userInfo"></small>
    </div>
    <button onclick="logout()">Logout</button>
</div>

<div class="live-popup" id="livePopup">
    🔥 AI MATCH FOUND!
</div>

<div class="container">

    <div id="notification" class="success-box"></div>

    <div class="card-box">
        <h3>Upload Item</h3>
        <input type="text" id="title" placeholder="Item Title">
        <textarea id="description" placeholder="Item Description"></textarea>

        <select id="status">
            <option value="lost">Lost</option>
            <option value="found">Found</option>
        </select>

        <input type="file" id="image" accept="image/*" capture="environment">

        <button class="primary" onclick="uploadItem()">Upload Item</button>
    </div>

    <div class="card-box">
        <h3>My Items</h3>
        <div class="items" id="itemsContainer"></div>
    </div>

</div>

<script>

const API_URL = window.location.origin;

const user_id = localStorage.getItem("user_id");
const name = localStorage.getItem("name");
const email = localStorage.getItem("email");

if (!user_id) {
    window.location.href = "/login-page";
}

document.getElementById("userInfo").innerText =
    (name || "") + " (" + (email || "") + ")";

function logout() {
    localStorage.clear();
    window.location.href = "/login-page";
}

function showNotification(message) {
    const box = document.getElementById("notification");
    box.innerText = message || "Action completed";
    box.style.display = "block";
    setTimeout(() => box.style.display = "none", 4000);
}

/* SOCKET */
const socket = io(API_URL);

socket.on("connect", () => {
    console.log("Socket connected");
});

socket.on("match_found", function(data){

    if(data.user1 == parseInt(user_id) || data.user2 == parseInt(user_id)){

        const popup = document.getElementById("livePopup");
        popup.style.display = "block";

        setTimeout(()=>{
            popup.style.display = "none";
        }, 4000);

        loadItems();
    }
});

async function uploadItem() {

    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const status = document.getElementById("status").value;
    const image = document.getElementById("image").files[0];

    if (!title || !description || !image) {
        alert("Please fill all fields");
        return;
    }

    const formData = new FormData();
    formData.append("title", title);
    formData.append("description", description);
    formData.append("status", status);
    formData.append("user_id", user_id);
    formData.append("image", image);

    try {
        const res = await fetch(`${API_URL}/upload`, {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        showNotification(data.message);
        loadItems();

    } catch (err) {
        alert("Upload failed");
    }
}

async function loadItems() {

    const res = await fetch(`${API_URL}/my-items/${user_id}`);
    const items = await res.json();

    const container = document.getElementById("itemsContainer");
    container.innerHTML = "";

    items.forEach(item => {

        container.innerHTML += `
            <div class="item-card">
                <div class="image-wrapper">
                    <img src="${item.image_url}">
                </div>

                <h4>${item.title}</h4>
                <p>${item.description}</p>

                <span class="badge ${item.status}">
                    ${item.status.toUpperCase()}
                </span>

                ${item.matched ? '<span class="badge matched">AI MATCHED</span>' : ''}

                <button class="delete-btn"
                    onclick="deleteItem(${item.id})">
                    Delete
                </button>
            </div>
        `;
    });
}

async function deleteItem(id) {

    if (!confirm("Delete this item?")) return;

    await fetch(`${API_URL}/delete/${id}`, {
        method: "DELETE"
    });

    showNotification("Item deleted successfully");
    loadItems();
}

loadItems();

</script>

</body>
</html>
