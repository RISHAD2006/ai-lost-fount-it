{% extends 'base.html' %}
{% block content %}
<div class="grid" style="max-width:520px;margin:48px auto;">
  <div class="card">
    <h2>Create Account</h2>
    <p class="muted">Register as a student user to report lost or found items.</p>
    <div id="message"></div>
    <form id="registerForm">
      <label>Name<input type="text" name="name" required></label>
      <label>Email<input type="email" name="email" required></label>
      <label>Password<input type="password" name="password" required></label>
      <button class="btn" type="submit">Register</button>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const payload = Object.fromEntries(form.entries());
    const res = await fetch('/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
    const data = await res.json();
    document.getElementById('message').innerHTML = `<div class="notice">${data.message}</div>`;
    if (res.ok) setTimeout(() => location.href='/login-page', 700);
  });
</script>
{% endblock %}
